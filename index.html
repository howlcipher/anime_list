<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Otaku Timeline</title>

    <!-- Primary Meta Tags -->
    <meta name="title" content="Otaku Timeline" />
    <meta name="description" content="A blazing fast, beautifully dynamic visualizer for AniList anime and manga timelines. Instantly compare your lists with friends!" />

    <!-- Open Graph / Discord / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://howlcipher.github.io/Otaku-Timeline/" />
    <meta property="og:title" content="Otaku Timeline" />
    <meta property="og:description" content="A blazing fast, beautifully dynamic visualizer for AniList anime and manga timelines. Instantly compare your lists with friends!" />
    <meta property="og:image" content="https://howlcipher.github.io/Otaku-Timeline/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://howlcipher.github.io/Otaku-Timeline/" />
    <meta property="twitter:title" content="Otaku Timeline" />
    <meta property="twitter:description" content="A blazing fast, beautifully dynamic visualizer for AniList anime and manga timelines. Instantly compare your lists with friends!" />
    <meta property="twitter:image" content="https://howlcipher.github.io/Otaku-Timeline/og-image.jpg" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Modern/Anime fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
  </head>
  <body>
    <header role="banner" class="retro-header">
      <div class="header-container">
        <h1 class="logo">Otaku Timeline</h1>
        <button id="mobileMenuToggle" class="mobile-menu-toggle" aria-label="Toggle Menu" style="display: none;">☰</button>
      </div>
      
      <div id="headerContent" class="header-content-wrapper">
        <div class="controls" role="group" aria-label="Display Controls" style="display: flex; justify-content: flex-end; margin-bottom: 1rem;">
          <button id="themeToggle" aria-label="Toggle Dark/Light Theme">Theme</button>
          <button id="colorBlindToggle" aria-label="Toggle Colorblind Mode">👁️ High Contrast</button>
        </div>
        
        <div class="search-bar" role="search">
          <div class="input-group">
          <label for="username1" class="sr-only">Username 1</label>
          <input type="text" id="username1" placeholder="Username 1 (e.g. howlcipher)" aria-label="Primary AniList Username" />
        </div>
        
        <button id="addCompareBtn" aria-label="Compare with friend" title="Compare with a friend" style="background: var(--bg-color); color: var(--text-color); border: 2px solid var(--border-color); font-weight: bold; border-radius: 4px; cursor: pointer; padding: 0.5rem 1rem;">+ Compare</button>

        <div class="input-group" id="username2Container" style="display: none; align-items: center; gap: 0.5rem;">
          <label for="username2" class="sr-only">Username 2</label>
          <input type="text" id="username2" placeholder="Friend's Username" aria-label="Secondary AniList Username to Compare" />
          <button id="removeCompareBtn" aria-label="Cancel comparison" title="Cancel comparison" style="background: var(--bg-color); color: #ff5555; border: 2px solid var(--border-color); font-weight: bold; border-radius: 4px; cursor: pointer; padding: 0.5rem 0.75rem;">✕</button>
        </div>
        <button id="loadBtn" aria-label="Load User Data">Fetch Data</button>
      </div>
      
      <div class="filter-bar" style="display: flex; gap: 1rem; margin-top: 1rem; justify-content: center;">
        <button id="typeToggle" aria-label="Toggle Anime/Manga">Mode: ANIME</button>
        <button id="masterpieceToggle" aria-label="Toggle Masterpiece Filter">★ Masterpieces Only</button>
      </div>

      <div class="advanced-filters hidden" id="advanced-filters" style="display: flex; gap: 1rem; margin-top: 1rem; justify-content: center; flex-wrap: wrap;">
        <input type="text" id="searchInput" placeholder="Search titles..." style="padding: 0.5rem; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: var(--font-mono); border-radius: 4px; min-width: 200px;" />
        <select id="genreFilter" style="padding: 0.5rem; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: var(--font-mono); border-radius: 4px;">
          <option value="">All Genres</option>
        </select>
        <select id="yearFilter" style="padding: 0.5rem; border: 2px solid var(--border-color); background: var(--bg-color); color: var(--text-color); font-family: var(--font-mono); border-radius: 4px;">
          <option value="">All Years</option>
        </select>
      </div>

      <nav id="quick-nav" class="hidden" aria-label="Section Navigation">
        <a href="#section-watching" id="nav-watching-text">Watching</a>
        <a href="#section-planning" id="nav-planning-text">Plan to Watch</a>
        <a href="#section-paused">On Hold</a>
        <a href="#section-dropped">Dropped</a>
        <a href="#section-completed" id="nav-completed-text">Completed</a>
      </nav>
      <div class="links">
        <a href="https://github.com/howlcipher/Otaku-Timeline" target="_blank" rel="noopener noreferrer" aria-label="View source code on GitHub">Source Code</a> | 
        <a href="https://anilist.co" target="_blank" rel="noopener noreferrer" aria-label="Visit AniList website">Powered by AniList.co</a>
      </div>
      </div>
    </header>

    <main id="app" role="main" aria-live="polite">
      <div id="skeleton-container" class="hidden" role="status" aria-label="Loading data">
        <!-- Skeleton cards will be injected here by JS -->
      </div>
      
      <!-- Stats Banner -->
      <section id="stats-container" aria-label="User Statistics"></section>

      <!-- Comparison Stats Area -->
      <section id="compare-stats" class="hidden" aria-label="Comparison Statistics">
      </section>

      <!-- Main Content Area -->
      <div id="archive-content" aria-label="Anime Archive Timeline"></div>
    </main>

    <div id="toast-container" aria-live="assertive"></div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
